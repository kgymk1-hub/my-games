<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブラウザゲーム集</title>
  <link rel="stylesheet" href="shared/common.css" />
  <style>
    body{
      margin:0;
      font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
      background:#eef2ff;
      color:#111827;
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:20px;
    }
    header{
      background:#ffffff;
      border-radius:16px;
      padding:16px 18px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      margin-bottom:14px;
    }
    h1{
      margin:0 0 6px;
      font-size:1.25rem;
    }
    .note{
      margin:0;
      font-size:.9rem;
      color:#4b5563;
      line-height:1.45;
    }
    .grid{
      display:grid;
      gap:12px;
      grid-template-columns:1fr;
    }
    @media (min-width:720px){
      .grid{ grid-template-columns:1fr 1fr; }
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:14px 14px 12px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .title{
      font-weight:700;
      font-size:1.05rem;
      margin:0;
    }
    .desc{
      margin:0;
      color:#4b5563;
      font-size:.92rem;
      line-height:1.5;
      flex:1;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }
    a.btn{
      display:inline-block;
      text-decoration:none;
      background:#111827;
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      font-weight:650;
      font-size:.95rem;
      white-space:nowrap;
    }
    .tag{
      font-size:.8rem;
      color:#6b7280;
    }
    footer{
      margin-top:14px;
      color:#6b7280;
      font-size:.85rem;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>ブラウザゲーム集</h1>
      <p class="note">
        ここからゲームを選んで遊べます。<br>
        ※ハイスコアはゲームごとに端末・ブラウザへローカル保存されます（未実装のゲームもあります）。
      </p>
    </header>

    <main class="grid" id="gameList"></main>
  </div>

  <script>
    const fallbackGames = [
      { title: "10秒チャレンジ", desc: "体感10秒を狙うシンプルゲーム。誤差が小さいほど高スコア。", path: "games/10sec/index.html", tags: ["10秒", "短時間", "タイミング"] },
      { title: "さめがめ", desc: "同じ色のブロックがくっついた塊を選んで消す。まとめて消すと高得点。", path: "games/samegame/index.html", tags: ["消去パズル", "同色連結", "スコアアタック"] },
      { title: "Lights Out", desc: "マスを押すと自分と周囲の灯りが反転。すべての灯りを消すとクリア。", path: "games/lightout/index.html", tags: ["論理パズル", "脳トレ", "数学的思考"] },
      { title: "HITandBLOW", desc: "位置も数字も当たればHIT、数字だけ当たればBLOW。数字当てゲーム。", path: "games/HITandBLOW/index.html", tags: ["論理ゲーム", "推理", "数字当て"] },
      { title: "Slide Block", desc: "アイシテルニイガタを完成させるスライドブロックパズル。", path: "games/Slide Block/index.html", tags: ["スライドブロック", "パズル"] },
      { title: "2048", desc: "同じ数字タイルを合体させて2048以上を目指す定番パズル。", path: "games/2048/index.html", tags: ["数字パズル", "合体", "スコアアタック"] },
      { title: "Hex Minesweeper", desc: "六角形の盤面で地雷を避けながら安全マスを開くマインスイーパー。", path: "games/hex-minesweeper/index.html", tags: ["マインスイーパー", "六角形", "論理パズル"] },
      { title: "Flappy One-Click", desc: "クリック・タップ・Spaceだけで鳥を飛ばし、パイプを避けるワンボタンゲーム。", path: "games/flappy-oneclick/index.html", tags: ["アクション", "ワンボタン", "反射神経"] }
    ];

    async function loadGames() {
      try {
        const res = await fetch("games.json", { cache: "no-cache" });
        if (!res.ok) throw new Error(`games.json: ${res.status}`);
        const data = await res.json();
        return Array.isArray(data) ? data : fallbackGames;
      } catch (_) {
        return fallbackGames;
      }
    }

    const list = document.getElementById("gameList");

    function renderGames(games) {
      list.textContent = "";
      games.forEach(g => {
      const card = document.createElement("section");
      card.className = "card";

      const title = document.createElement("p");
      title.className = "title";
      title.textContent = g.title ?? "";

      const desc = document.createElement("p");
      desc.className = "desc";
      desc.textContent = g.desc ?? "";

      const row = document.createElement("div");
      row.className = "row";

      const tag = document.createElement("span");
      tag.className = "tag";
      const tags = Array.isArray(g.tags) ? g.tags.map(t => `#${t}`).join(" ") : (g.tag || "");
      tag.textContent = tags;

      const a = document.createElement("a");
      a.className = "btn";
      a.textContent = "あそぶ";

      // hrefは属性として安全にセット
      // ついでに「空/不正」対策：pathが無ければボタン無効化
      if (typeof g.path === "string" && g.path.trim() !== "") {
        a.href = g.path;
        a.setAttribute("aria-label", `${g.title}で遊ぶ`);
      } else {
        a.href = "#";
        a.setAttribute("aria-disabled", "true");
        a.style.opacity = "0.5";
        a.style.pointerEvents = "none";
        a.title = "リンク先が未設定です";
      }

      row.append(tag, a);
      card.append(title, desc, row);
      list.appendChild(card);
      });
    }

    loadGames().then(renderGames);
  </script>
</body>
</html>
