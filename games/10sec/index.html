<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../shared/common.css" />
  <title>10秒チャレンジ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;

      /* ランキングが増えても画面上部から確認できるようにする。 */
      min-height: 100vh;
      height: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px 12px;
      box-sizing: border-box;
      overflow-y: auto;

      background: #e9eef8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      /* 連打時の意図しないテキスト選択を防ぐ。 */
      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;

      /* 小さい端末では画面幅に合わせて縮める。 */
      width: min(360px, 100%);
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.2rem;
    }

    .time {
      font-size: 2rem;
      margin: 16px 0;
      min-height: 2.2rem;
      color: #333;
    }

    button {
      width: 100%;
      padding: 12px 0;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.1s;
      color: white;
      background: #4b6fff;
      touch-action: manipulation; /* タップ時の余計な遅延を減らす */
    }

    button:active { transform: translateY(1px); }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 12px;
      font-size: 1rem;
      min-height: 1.2rem;
    }

    .hiscore {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #444;
      background: #f4f7ff;
      border-radius: 10px;
      padding: 12px 12px;
      text-align: left;
      line-height: 1.35;

      /* 記録をコピーできるようランキング欄だけ選択可能にする。 */
      user-select: text;
      -webkit-user-select: text;
    }

    .hiscore b { color: #2a46c6; }

    .rankhead {
      margin-top: 0;
      font-weight: 700;
      font-size: 0.95rem;
      color: #2a46c6;
    }

    .ranklist {
      margin: 6px 0 0;
      padding-left: 1.2rem;
    }

    .rankitem { margin: 6px 0; }

    .mono {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    .sep {
      margin: 10px 0;
      height: 1px;
      background: rgba(0,0,0,0.08);
    }

    .danger-zone {
      margin-top: 48px;
      padding-top: 18px;
      border-top: 1px solid rgba(0,0,0,0.08);
      display: flex;
      justify-content: flex-end;
    }

    .danger-button {
      width: auto;
      min-width: 0;
      padding: 8px 12px;
      font-size: 0.82rem;
      background: #8892a6;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>10秒チャレンジ</h1>

  <div id="time" class="time">　</div>

  <button id="mainBtn" type="button">スタート</button>

  <div id="result" class="result"></div>

  <div id="hiscore" class="hiscore"></div>

  <div class="danger-zone" aria-label="ランキング管理">
    <button id="resetBtn" class="danger-button" type="button">ランキングをリセット</button>
  </div>
</div>

<script src="../../shared/storage.js"></script>
<script>
  let startTime = null;
  let isRunning = false;

  const timeDisplay = document.getElementById('time');
  const resultDisplay = document.getElementById('result');
  const mainBtn = document.getElementById('mainBtn');
  const hiscoreDisplay = document.getElementById('hiscore');
  const resetBtn = document.getElementById('resetBtn');

  // ランキングは上位10件を端末内に保存する。
  const RANK_KEY = "myGames:tenSecChallenge:rankings:v2";
  const LEGACY_RANK_KEY = "tenSecChallenge_rankings_v2";
  const MAX_RANK = 10;

  // pointerdown と click の連続発火を抑える。
  let lastActionAt = 0;
  const ACTION_GUARD_MS = 350;

  function nowMs() {
    return performance.now();
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return `${y}/${m}/${day} ${hh}:${mm}`;
  }

  function safeNumber(n) {
    return (typeof n === "number" && Number.isFinite(n)) ? n : null;
  }

  function loadRankings() {
    try {
      const raw = SafeStorage.get(RANK_KEY) || SafeStorage.get(LEGACY_RANK_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr)) return [];

      const cleaned = arr.map(x => ({
        elapsed: safeNumber(x?.elapsed),
        diff: safeNumber(x?.diff),
        ts: safeNumber(x?.ts)
      })).filter(r => r.elapsed !== null && r.diff !== null && r.ts !== null);

      return cleaned.sort(compareRecord).slice(0, MAX_RANK);
    } catch {
      return [];
    }
  }

  function saveRankings(ranks) {
    SafeStorage.set(RANK_KEY, JSON.stringify(ranks));
  }

  // 誤差が小さい順、同点なら計測時間が短い順に並べる。
  function compareRecord(a, b) {
    if (a.diff !== b.diff) return a.diff - b.diff;
    if (a.elapsed !== b.elapsed) return a.elapsed - b.elapsed;
    return a.ts - b.ts;
  }

  // 上位記録をリスト形式で表示する。
  function renderRankings(ranks) {
    const sorted = [...ranks].sort(compareRecord).slice(0, MAX_RANK);
    hiscoreDisplay.textContent = "";

    const head = document.createElement("div");
    head.className = "rankhead";
    head.textContent = `ランキング（上位${MAX_RANK}件）`;
    hiscoreDisplay.appendChild(head);

    if (!sorted.length) {
      hiscoreDisplay.appendChild(document.createTextNode("まだ記録がありません。"));
      return;
    }

    const list = document.createElement("ol");
    list.className = "ranklist";
    for (const r of sorted) {
      const item = document.createElement("li");
      item.className = "rankitem";

      const diff = document.createElement("b");
      diff.className = "mono";
      diff.textContent = `${r.diff.toFixed(3)} 秒`;

      const elapsed = document.createElement("span");
      elapsed.className = "mono";
      elapsed.textContent = `${r.elapsed.toFixed(3)} 秒`;

      const date = document.createElement("span");
      date.style.color = "#666";
      date.textContent = formatDate(r.ts);

      item.append("誤差 ", diff, " / 記録 ", elapsed, document.createElement("br"), date);
      list.appendChild(item);
    }
    hiscoreDisplay.appendChild(list);
  }

  function setRunningUI(running) {
    isRunning = running;

    if (running) {
      mainBtn.textContent = "ストップ";
      mainBtn.style.background = "#ff6b6b";
      resetBtn.disabled = true; // 計測中はリセット禁止
    } else {
      mainBtn.textContent = "スタート";
      mainBtn.style.background = "#4b6fff";
      resetBtn.disabled = false;
    }
  }

  function shouldGuardAction() {
    const t = nowMs();
    if (t - lastActionAt < ACTION_GUARD_MS) return true;
    lastActionAt = t;
    return false;
  }

  function handleStart() {
    startTime = nowMs();
    resultDisplay.textContent = "";
    timeDisplay.textContent = "計測中…";
    setRunningUI(true);
  }

  function handleStop() {
    const end = nowMs();
    setRunningUI(false);

    const elapsed = (end - startTime) / 1000;
    const diff = Math.abs(elapsed - 10);

    timeDisplay.textContent = elapsed.toFixed(3) + " 秒";
    resultDisplay.textContent = `誤差：${diff.toFixed(3)} 秒`;

    const newRec = { elapsed, diff, ts: Date.now() };
    const merged = [...rankings, newRec].sort(compareRecord).slice(0, MAX_RANK);

    const entered = merged.some(r => r === newRec);

    if (entered) {
      rankings = merged;
      saveRankings(rankings);
      renderRankings(rankings);
      resultDisplay.textContent += "（🎉 ランキング入り）";
    } else {
      resultDisplay.textContent += "（ランキング外）";
    }
  }

  function triggerAction(srcEvent) {
    if (srcEvent) {
      // タッチ操作だけブラウザ既定動作を抑える。
      if (srcEvent.type === "pointerdown") {
        if (srcEvent.pointerType === "touch" || srcEvent.pointerType === "pen") {
          srcEvent.preventDefault();
        }
      } else if (srcEvent.type === "keydown") {
        // Space キーによるスクロールを防ぐ。
        srcEvent.preventDefault();
      }
    }

    if (shouldGuardAction()) return;

    if (!isRunning) handleStart();
    else handleStop();
  }

  // タッチ開始時に反応させて入力遅延を減らす。
  mainBtn.addEventListener('pointerdown', (e) => triggerAction(e));

  // click はキーボード操作と環境差のフォールバック。
  mainBtn.addEventListener('click', (e) => triggerAction(e));

  // 操作要素にフォーカスがあるときは要素本来のキー操作を優先する。
  document.addEventListener('keydown', (e) => {
    const k = e.key;
    if (!(k === "Enter" || k === " " || k === "Spacebar")) return;

    // ボタンや入力欄ではグローバルショートカットを無効にする。
    const t = e.target;
    if (t && typeof t.closest === "function") {
      const interactive = t.closest('button, a, input, textarea, select, summary, [role="button"], [contenteditable="true"]');
      if (interactive) return;
    }

    // 背景フォーカス時だけ開始・停止ショートカットとして扱う。
    triggerAction(e);
  }, { passive: false });

  // ランキングリセット（pointerdown + click）
  function resetRanking(e) {
    if (e && e.type === "pointerdown") {
      if (e.pointerType === "touch" || e.pointerType === "pen") e.preventDefault();
    }
    if (isRunning) return;

    SafeStorage.remove(RANK_KEY);
    SafeStorage.remove(LEGACY_RANK_KEY);
    rankings = [];
    renderRankings(rankings);
    resultDisplay.textContent = "ランキングをリセットしました";
  }

  let rankings = loadRankings();
  saveRankings(rankings);
  renderRankings(rankings);

  resetBtn.addEventListener('pointerdown', resetRanking);
  resetBtn.addEventListener('click', resetRanking);
</script>

</body>
</html>
